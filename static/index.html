<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho Projects Timesheet Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=1.2.7">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-clock-rotate-left logo-icon"></i>
                <h2 class="sidebar-text">TimeSync</h2>
            </div>

            <div class="sidebar-section">
                <label for="project-select" class="sidebar-text">Active Project</label>
                <div class="select-wrapper">
                    <select id="project-select">
                        <option value="">Loading Projects...</option>
                    </select>
                </div>
            </div>

            <div class="sidebar-section">
                <label for="user-filter" class="sidebar-text">Assignee Filter</label>
                <div class="select-wrapper">
                    <select id="user-filter">
                        <option value="All" selected>All Team</option>
                        <option value="Aman">Aman (You)</option>
                        <option value="Rohan">Rohan</option>
                        <option value="Aisha">Aisha</option>
                    </select>
                </div>
            </div>

            <nav class="navigation">
                <a href="#" class="nav-item active" data-view="board">
                    <i class="fa-solid fa-table-columns"></i> <span class="sidebar-text">Board View</span>
                </a>

                <a href="#" class="nav-item" data-view="history">
                    <i class="fa-solid fa-history"></i> <span class="sidebar-text">Local Logs (<span id="local-logs-count">0</span>)</span>
                </a>
            </nav>

            <div class="sidebar-footer sidebar-text"
                style="padding: 12px 24px; border-top: 1px solid var(--border-color); text-align: center; font-size: 11.5px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.3px;">
                TimeSync Dashboard v1.1.0
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button id="sidebar-toggle-btn" class="secondary-btn" style="padding: 10px 14px; border: 1px solid var(--border-color);" title="Toggle Sidebar">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="header-title">
                        <h1 id="view-title">Board View</h1>
                        <p id="view-subtitle" class="text-secondary">E-Commerce App Redesign</p>
                    </div>
                </div>

                <div class="header-actions">
                    <div class="oauth-box" id="oauth-status-box" style="display: none;">
                        <button id="auth-zoho-btn" class="primary-btn pulse-glow">
                            <i class="fa-brands fa-google"></i> Connect Zoho Account
                        </button>
                    </div>
                    <button id="sync-now-btn" class="success-btn">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Sync to Zoho Projects
                    </button>

                    <button id="theme-toggle-btn" class="secondary-btn" style="padding: 10px 14px;"
                        title="Toggle Dark/Light Mode">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <a href="/api/logout" id="logout-btn" class="secondary-btn"
                        style="padding: 10px 14px; text-decoration: none;" title="Logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </a>
                </div>
            </header>

            <!-- Dashboard Content Views -->
            <section class="content-body">
                <!-- Board View -->
                <div id="board-view" class="view-panel active">
                    <div class="board-columns" id="board-columns"></div>
                </div>

                <!-- Local Logs History View -->
                <div id="history-view" class="view-panel">
                    <div class="card history-card"
                        style="display: flex; flex-direction: column; max-height: 480px; padding: 0; overflow: hidden; border-radius: 16px; background-color: var(--bg-card); box-shadow: var(--shadow-md); border: 1px solid var(--border-color);">
                        <div class="card-header"
                            style="flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border-color); gap: 16px; flex-wrap: wrap;">
                            <h3>Local Timesheets History</h3>
                            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                                <div class="select-wrapper" style="min-width: 160px; margin-bottom: 0;">
                                    <select id="history-user-filter"
                                        style="padding: 8px 12px; background-color: var(--bg-body); border-radius: 8px; font-weight: 500;">
                                        <option value="All">All Users</option>
                                        <option value="Gurjeet Kaur">Gurjeet Kaur</option>
                                        <option value="Vindhya Kesharwani">Vindhya Kesharwani</option>
                                        <option value="Aashay Soni">Aashay Soni</option>
                                        <option value="Rahul Patel">Rahul Patel</option>
                                    </select>
                                </div>
                                <button id="reset-history-btn" class="secondary-btn"
                                    style="border-color: rgba(220, 38, 38, 0.4); color: #ef4444; padding: 8px 14px;"
                                    title="Clear Logs Database">
                                    <i class="fa-solid fa-trash-can"></i> Reset Logs
                                </button>
                                <button id="sync-history-btn" class="primary-btn" style="padding: 8px 14px;">
                                    <i class="fa-solid fa-rotate"></i> Sync All Pending
                                </button>
                            </div>
                        </div>
                        <div class="table-scroll-wrapper"
                            style="flex-grow: 1; overflow-y: auto; overflow-x: auto; padding: 0;">
                            <table class="table" style="width: 100%; border-collapse: collapse;">
                                <thead>
                                    <tr>
                                        <th class="col-project"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Project</th>
                                        <th class="col-task"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Task Name</th>
                                        <th class="col-user"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Logged By</th>
                                        <th class="col-hours"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Hours</th>
                                        <th class="col-type"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Type</th>
                                        <th class="col-notes"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Notes</th>
                                        <th class="col-task-status"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Task Status</th>
                                        <th class="col-status"
                                            style="position: sticky; top: 0; background-color: var(--bg-card); z-index: 10;">
                                            Sync Status</th>
                                    </tr>
                                </thead>
                                <tbody id="history-logs-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Time Log Modal -->
    <div id="time-log-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Log Time</h2>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-task-details">
                    <h3 id="modal-task-title">Design Figma Mockups</h3>
                    <p id="modal-project-title" class="text-secondary">E-Commerce App Redesign</p>
                    <div id="modal-task-desc-container"
                        style="display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); font-size: 13px;">
                        <strong style="color: var(--text-secondary);">Description:</strong>
                        <p id="modal-task-desc" class="text-secondary" style="margin-top: 4px; line-height: 1.4;"></p>
                    </div>
                    <div id="modal-attachments-container"
                        style="display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); font-size: 13px;">
                        <strong style="color: var(--text-secondary);"><i class="fa-solid fa-paperclip"></i>
                            Attachments:</strong>
                        <div id="modal-attachments-list"
                            style="margin-top: 6px; display: flex; flex-direction: column; gap: 6px;"></div>
                    </div>
                </div>

                <!-- Log Type Selection Tabs -->
                <div class="log-tabs">
                    <button class="tab-btn active" data-tab="timer">
                        <i class="fa-solid fa-stopwatch"></i> Stop Watch
                    </button>
                    <button class="tab-btn" data-tab="manual">
                        <i class="fa-solid fa-keyboard"></i> Manual Input
                    </button>
                </div>

                <!-- Tab 1: Timer Mode -->
                <div id="tab-timer" class="tab-content active">
                    <div class="timer-display">
                        <span id="timer-text">00:00:00</span>
                    </div>
                    <div class="timer-controls">
                        <button id="timer-start-btn" class="timer-btn play"><i class="fa-solid fa-play"></i>
                            Start</button>
                        <button id="timer-pause-btn" class="timer-btn pause" disabled><i class="fa-solid fa-pause"></i>
                            Pause</button>
                        <button id="timer-stop-btn" class="timer-btn stop" disabled><i class="fa-solid fa-stop"></i> Log
                            Time</button>
                    </div>
                </div>

                <!-- Tab 2: Manual Log Mode -->
                <div id="tab-manual" class="tab-content">
                    <div class="input-grid">
                        <div class="input-field">
                            <label for="manual-hours">Total Hours</label>
                            <input type="number" id="manual-hours" placeholder="e.g. 2.5" min="0.1" step="0.1">
                        </div>
                        <div class="input-field">
                            <label for="manual-start">Start Time</label>
                            <input type="time" id="manual-start">
                        </div>
                        <div class="input-field">
                            <label for="manual-end">End Time</label>
                            <input type="time" id="manual-end">
                        </div>
                    </div>
                </div>

                <!-- Shared Settings (Notes) -->
                <div class="shared-fields">
                    <div class="input-field" style="margin-bottom: 16px;">
                        <label for="log-user"
                            style="font-weight: 500; margin-bottom: 6px; display: block; color: var(--text-secondary); font-size: 13.5px;">Log
                            As (User)</label>
                        <div class="select-wrapper">
                            <select id="log-user">
                                <option value="Gurjeet Kaur">Gurjeet Kaur</option>
                                <option value="Vindhya Kesharwani">Vindhya Kesharwani</option>
                                <option value="Aashay Soni">Aashay Soni</option>
                                <option value="Rahul Patel">Rahul Patel</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-field" style="margin-bottom: 16px;">
                        <label for="log-task-status"
                            style="font-weight: 500; margin-bottom: 6px; display: block; color: var(--text-secondary); font-size: 13.5px;">Task Status</label>
                        <div class="select-wrapper">
                            <select id="log-task-status">
                                <option value="In Progress" selected>In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-field full-width">
                        <label for="log-notes">Notes / Description</label>
                        <textarea id="log-notes" rows="3" placeholder="What did you work on?"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="secondary-btn" id="cancel-log-btn">Cancel</button>
                <button class="primary-btn" id="save-log-btn">Save Timesheet Entry</button>
            </div>
        </div>
    </div>

    <!-- Alert Banner / Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js?v=1.2.7"></script>
</body>

</html>
