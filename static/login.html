<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSync Dashboard - Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0b10;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --text-main: #e2e8f0;
            --text-sub: #718096;
            --accent: #ccd5ae; /* Calming sage green */
            --accent-hover: #e8e8e4;
            --card-bg: rgba(18, 19, 26, 0.6);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(204, 213, 174, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(143, 166, 203, 0.03) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 380px;
            max-width: 90%;
            padding: 48px;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 40px;
            text-align: left;
        }

        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 300;
            margin: 0;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .header p {
            font-size: 13.5px;
            color: var(--text-sub);
            margin: 8px 0 0 0;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .input-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: #ffffff;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-control:focus {
            outline: none;
            border-color: var(--accent);
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--accent);
            color: #0a0b10;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .demo-btn {
            width: 100%;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-sizing: border-box;
            text-align: center;
        }

        .demo-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            color: #ffffff;
        }

        .error-message {
            color: #e5989b;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            background: rgba(229, 152, 155, 0.05);
            border: 1px solid rgba(229, 152, 155, 0.1);
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            font-weight: 300;
            line-height: 1.4;
        }

        .footer {
            margin-top: 48px;
            font-size: 11px;
            color: var(--text-sub);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: left;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand-logo">TIMESYNC</div>
            <h1>Dashboard</h1>
            <p>Timesheet Sync Portal</p>
        </div>

        <div id="error-box" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="input-control" placeholder="admin" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
            <button type="button" id="demo-btn" class="demo-btn">Demo Sign In</button>
        </form>

        <div class="footer">
            TimeSync Dashboard &copy; 2026
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            errorBox.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    window.location.href = '/index.html';
                } else {
                    const data = await res.json();
                    errorBox.innerText = data.detail || 'Invalid username or password';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorBox.innerText = 'Failed to connect to the server.';
                errorBox.style.display = 'block';
            }
        });

        document.getElementById('demo-btn').addEventListener('click', () => {
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
            document.getElementById('login-form').dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
